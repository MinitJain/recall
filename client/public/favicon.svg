<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="dot2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9ee"/>
      <stop offset="40%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <radialGradient id="dot3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbf0"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="dot4" cx="50%" cy="50%" r="50%">
