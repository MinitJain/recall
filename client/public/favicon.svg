  <rect width="32" height="32" rx="7" fill="#1a0e00"/>

  <!-- Amber circle (core) -->
  <circle cx="16" cy="16" r="8" fill="#d97706"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.6"/>

  <!-- Constellation dots -->
  <circle cx="13" cy="12" r="1.8" fill="#fff8e1"/>
