<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="560" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">What runs when you paste a URL — technical flow</text>

  <!-- BROWSER box -->
  <rect x="30" y="55" width="140" height="160" rx="12" fill="#1e1b2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#a78bfa">Browser</text>
  <text x="100" y="98" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#c4b5fd">React UI</text>
  <rect x="44" y="112" width="112" height="36" rx="6" fill="#0f1117" stroke="#3d3555" stroke-width="1"/>
  <text x="100" y="130" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">SaveUrlForm.tsx</text>
  <rect x="44" y="158" width="112" height="36" rx="6" fill="#0f1117" stroke="#3d3555" stroke-width="1"/>
  <text x="100" y="176" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">BookmarkCard.tsx</text>

  <!-- NEXT.JS box -->
  <rect x="220" y="55" width="200" height="200" rx="12" fill="#0f2a2a" stroke="#0d9488" stroke-width="1.5"/>
  <text x="320" y="80" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#5eead4">Next.js server</text>
  <text x="320" y="98" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#99f6e4">Vercel (your backend)</text>
  <rect x="236" y="112" width="168" height="32" rx="6" fill="#0f1117" stroke="#1a3a3a" stroke-width="1"/>
  <text x="320" y="128" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">POST /api/bookmarks</text>
  <rect x="236" y="154" width="168" height="32" rx="6" fill="#0f1117" stroke="#1a3a3a" stroke-width="1"/>
  <text x="320" y="170" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">scraper.ts — fetches OG data</text>
  <rect x="236" y="196" width="168" height="32" rx="6" fill="#0f1117" stroke="#1a3a3a" stroke-width="1"/>
  <text x="320" y="212" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">gemini.ts — asks AI for tags</text>

  <!-- SUPABASE box -->
  <rect x="470" y="55" width="170" height="80" rx="10" fill="#0f1e2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="555" y="83" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#93c5fd">Supabase</text>
  <text x="555" y="103" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">PostgreSQL database</text>
  <text x="555" y="120" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">via Prisma ORM</text>

  <!-- GEMINI box -->
  <rect x="470" y="165" width="170" height="60" rx="10" fill="#2a1f05" stroke="#d97706" stroke-width="1.5"/>
  <text x="555" y="188" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#fbbf24">Gemini API</text>
  <text x="555" y="208" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Google — generates tags</text>

  <!-- SUPABASE AUTH box -->
  <rect x="470" y="255" width="170" height="60" rx="10" fill="#2a0f0f" stroke="#dc2626" stroke-width="1.5"/>
  <text x="555" y="278" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#f87171">Supabase Auth</text>
  <text x="555" y="298" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Login / session tokens</text>

  <!-- ARROWS -->
  <!-- Browser → Next.js (POST) -->
  <line x1="172" y1="133" x2="218" y2="133" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="195" y="124" text-anchor="middle" font-size="10" fill="#94a3b8">POST request</text>

  <!-- Next.js → Supabase -->
  <line x1="422" y1="105" x2="468" y2="105" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="97" text-anchor="middle" font-size="10" fill="#94a3b8">Prisma saves</text>

  <!-- Next.js → Gemini -->
  <line x1="422" y1="212" x2="468" y2="212" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="203" text-anchor="middle" font-size="10" fill="#94a3b8">asks for tags</text>

  <!-- Next.js → Auth -->
  <line x1="422" y1="245" x2="468" y2="278" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="256" text-anchor="middle" font-size="10" fill="#94a3b8">verifies user</text>

  <!-- Next.js → Browser (response) -->
  <line x1="218" y1="153" x2="172" y2="153" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="195" y="169" text-anchor="middle" font-size="10" fill="#94a3b8">bookmark JSON</text>

  <!-- Divider -->
  <line x1="30" y1="340" x2="640" y2="340" stroke="#1e293b" stroke-width="1"/>
  <text x="340" y="360" text-anchor="middle" font-size="12" fill="#64748b">What lives where in your codebase</text>

  <!-- app/ box -->
  <rect x="30" y="375" width="140" height="80" rx="8" fill="#1e1b2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="100" y="400" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#a78bfa">app/</text>
  <text x="100" y="419" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Pages + layouts</text>
  <text x="100" y="437" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">React renders here</text>

  <!-- app/api/ box -->
  <rect x="190" y="375" width="140" height="80" rx="8" fill="#0f2a2a" stroke="#0d9488" stroke-width="1.5"/>
  <text x="260" y="400" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#5eead4">app/api/</text>
  <text x="260" y="419" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Route handlers</text>
  <text x="260" y="437" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Like Express routes</text>

  <!-- lib/ box -->
  <rect x="350" y="375" width="140" height="80" rx="8" fill="#2a1f05" stroke="#d97706" stroke-width="1.5"/>
  <text x="420" y="400" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#fbbf24">lib/</text>
  <text x="420" y="419" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">Shared utilities</text>
  <text x="420" y="437" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">prisma.ts, gemini.ts</text>

  <!-- prisma/ box -->
  <rect x="510" y="375" width="140" height="80" rx="8" fill="#0f1e2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="400" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#93c5fd">prisma/</text>
  <text x="580" y="419" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">schema.prisma</text>
  <text x="580" y="437" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#94a3b8">defines DB tables</text>

  <!-- Divider 2 -->
  <line x1="30" y1="475" x2="640" y2="475" stroke="#1e293b" stroke-width="1"/>

  <!-- Request trace -->
  <text x="340" y="497" text-anchor="middle" font-size="10" fill="#64748b">Trace one request:</text>
  <text x="340" y="516" text-anchor="middle" font-size="10" fill="#64748b">paste URL &#8594; POST /api/bookmarks &#8594; scraper &#8594; gemini &#8594; prisma &#8594; DB &#8594; response &#8594; UI</text>
  <text x="340" y="540" text-anchor="middle" font-size="10" fill="#475569">Recall — Architecture — recall.app</text>
</svg>
