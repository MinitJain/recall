<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">What Recall does — as a user</text>

  <!-- STEP 1: You paste a URL -->
  <rect x="30" y="58" width="140" height="80" rx="12" fill="#1e1b2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">You paste a URL</text>
  <text x="100" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">Any link</text>
  <text x="100" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">from the web</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="98" x2="208" y2="98" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 2: Recall fetches it -->
  <rect x="210" y="58" width="140" height="80" rx="12" fill="#0f2a2a" stroke="#0d9488" stroke-width="1.5"/>
  <text x="280" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">Recall fetches it</text>
  <text x="280" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">Title, description,</text>
  <text x="280" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">thumbnail</text>

  <!-- Arrow 2 -->
  <line x1="352" y1="98" x2="388" y2="98" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 3: AI reads it -->
  <rect x="390" y="58" width="140" height="80" rx="12" fill="#2a1f05" stroke="#d97706" stroke-width="1.5"/>
  <text x="460" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">AI reads it</text>
  <text x="460" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">Gemini generates</text>
  <text x="460" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">3–5 tags</text>

  <!-- Arrow 3 -->
  <line x1="532" y1="98" x2="568" y2="98" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 4: What you see -->
  <rect x="570" y="58" width="82" height="80" rx="12" fill="#0f1e2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="611" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">What you</text>
  <text x="611" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">see in the</text>
  <text x="611" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">app</text>

  <!-- Divider -->
  <line x1="30" y1="168" x2="650" y2="168" stroke="#1e293b" stroke-width="1"/>

  <!-- BOOKMARK CARD PREVIEW -->
  <!-- Card background -->
  <rect x="60" y="188" width="560" height="180" rx="14" fill="#161b27" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Thumbnail placeholder -->
  <rect x="80" y="208" width="110" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="135" y="244" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#475569">thumbnail</text>

  <!-- Article title -->
  <text x="210" y="222" font-size="13" font-weight="700" fill="#e2e8f0">How to learn in public — Swyx</text>

  <!-- Article description -->
  <text x="210" y="242" font-size="11" fill="#64748b">A guide to building your reputation by sharing</text>
  <text x="210" y="258" font-size="11" fill="#64748b">what you learn</text>

  <!-- Tags row -->
  <!-- Tag: learning -->
  <rect x="210" y="272" width="62" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="241" y="283" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#94a3b8">learning</text>

  <!-- Tag: career -->
  <rect x="280" y="272" width="50" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="305" y="283" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#94a3b8">career</text>

  <!-- Tag: writing -->
  <rect x="338" y="272" width="50" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="363" y="283" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#94a3b8">writing</text>

  <!-- Tag: open-source -->
  <rect x="396" y="272" width="76" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="434" y="283" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#94a3b8">open-source</text>

  <!-- AI tag badge -->
  <rect x="480" y="272" width="62" height="22" rx="11" fill="#2a1f05" stroke="#d97706" stroke-width="1"/>
  <text x="511" y="278" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#fbbf24">&#10022; AI tag</text>

  <!-- URL -->
  <text x="210" y="318" font-size="10" fill="#475569">swyx.io/learn-in-public</text>

  <!-- Timestamp -->
  <text x="590" y="318" text-anchor="end" font-size="10" fill="#334155">saved 2m ago</text>

  <!-- Footer label -->
  <text x="340" y="396" text-anchor="middle" font-size="10" fill="#475569">Recall — recall.app</text>
</svg>
